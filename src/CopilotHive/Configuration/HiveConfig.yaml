# CopilotHive Configuration
version: "1.0"

# Repositories workers are allowed to work on
repositories:
  - name: my-app
    url: https://github.com/org/my-app.git
    default_branch: main
  - name: my-api
    url: https://github.com/org/my-api.git
    default_branch: main

# Worker settings
workers:
  coder:
    model: claude-opus-4.6
    context_window: 150000
  reviewer:
    model: gpt-5.4
  tester:
    model: claude-sonnet-4.6
  improver:
    model: claude-sonnet-4.6

# Orchestrator settings
orchestrator:
  model: claude-sonnet-4.6
  max_iterations: 10
  max_retries_per_task: 3
  always_improve: true
  verbose_logging: false
  worker_context_window: 150000
  brain_context_window: 150000  # Max tokens for the Brain model's context
  brain_max_steps: 50           # Max tool-call steps per Brain request

# Model-level configuration
models:
  compaction_model: null  # Model for context compaction summaries (e.g. "copilot/gpt-5.4-mini"). Uses main model when null.
