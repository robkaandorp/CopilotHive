name: CI — Build, Test & Push Containers

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  ORCHESTRATOR_IMAGE: ghcr.io/robkaandorp/copilothive-orchestrator
  WORKER_IMAGE: ghcr.io/robkaandorp/copilothive-worker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-install-dir: '/usr/share/dotnet'

      - name: Restore
        run: dotnet restore CopilotHive.slnx

      - name: Build
        run: dotnet build CopilotHive.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/CopilotHive.Tests/CopilotHive.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set version
        id: version
        run: |
          PREFIX=$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          echo "version=${PREFIX}-beta.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

      # ── Orchestrator ──────────────────────────────────────────────
      - name: Orchestrator — metadata
        id: orchestrator-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ORCHESTRATOR_IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Orchestrator — build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/orchestrator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.orchestrator-meta.outputs.tags }}
          labels: ${{ steps.orchestrator-meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator

      # ── Worker ────────────────────────────────────────────────────
      - name: Worker — metadata
        id: worker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WORKER_IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Worker — build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.worker-meta.outputs.tags }}
          labels: ${{ steps.worker-meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
