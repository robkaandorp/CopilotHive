services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/orchestrator/Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - GH_TOKEN
      - BRAIN_MODEL=${BRAIN_MODEL:-copilot/claude-sonnet-4.6}
      - GRPC_PORT=5000
    command: ["--config-repo=https://github.com/robkaandorp/CopilotHive-Config.git"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - orchestrator-state:/app/state
    networks:
      - hive

  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - GH_TOKEN
      - VERBOSE_LOGGING
      - LLM_PROVIDER=${LLM_PROVIDER:-copilot}
      - CONFIG_REPO_URL=https://github.com/robkaandorp/CopilotHive-Config.git
      - GITHUB_TOKEN
      - OLLAMA_API_KEY
      - OLLAMA_URL
      - OLLAMA_MODEL
      - GITHUB_MODEL
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
    volumes:
      - diagnostics:/app/diagnostics
    networks:
      - hive

volumes:
  orchestrator-state:
  diagnostics:

networks:
  hive:
