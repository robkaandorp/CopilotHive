services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/orchestrator/Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - GH_TOKEN
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_PORT=8100
      - GRPC_PORT=5000
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
    command: ["--config-repo=https://github.com/robkaandorp/CopilotHive-Config.git"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - orchestrator-state:/app/state
      - copilot-sessions:/root/.copilot
    networks:
      - hive

  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - GH_TOKEN
      - VERBOSE_LOGGING
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
      - CONFIG_REPO_URL=https://github.com/robkaandorp/CopilotHive-Config.git
      - RUNNER_TYPE=${RUNNER_TYPE:-copilotcli}
      - LLM_PROVIDER=${LLM_PROVIDER:-github}
      - GITHUB_TOKEN
      - OLLAMA_API_KEY
      - OLLAMA_URL
      - OLLAMA_MODEL
      - GITHUB_MODEL
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
    networks:
      - hive

volumes:
  orchestrator-state:
  copilot-sessions:

networks:
  hive:
