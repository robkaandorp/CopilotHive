services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/orchestrator/Dockerfile
    command:
      - dotnet
      - CopilotHive.dll
      - --serve
      - --port=5000
      - --config-repo=https://github.com/robkaandorp/CopilotHive-Config.git
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - GH_TOKEN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - orchestrator-state:/app/state
    networks:
      - hive

  coder:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - WORKER_ROLE=coder
      - GH_TOKEN
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - hive

  reviewer:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - WORKER_ROLE=reviewer
      - GH_TOKEN
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - hive

  tester:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - WORKER_ROLE=tester
      - GH_TOKEN
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - hive

  improver:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - WORKER_ROLE=improver
      - GH_TOKEN
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - hive

volumes:
  orchestrator-state:

networks:
  hive:
