services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/orchestrator/Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - GH_TOKEN
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_PORT=8100
      - GRPC_PORT=5000
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
    command: ["--config-repo=https://github.com/robkaandorp/CopilotHive-Config.git"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - orchestrator-state:/app/state
      - copilot-sessions:/root/.copilot
    networks:
      - hive

  coder:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - WORKER_ROLE=coder
      - GH_TOKEN
      - VERBOSE_LOGGING
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - hive

  reviewer:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - WORKER_ROLE=reviewer
      - GH_TOKEN
      - VERBOSE_LOGGING
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - hive

  tester:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - WORKER_ROLE=tester
      - GH_TOKEN
      - VERBOSE_LOGGING
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - hive

  improver:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - WORKER_ROLE=improver
      - GH_TOKEN
      - VERBOSE_LOGGING
      - COPILOT_MODEL=claude-sonnet-4.6
      - COPILOT_ALLOW_ALL=true
      - COPILOT_AUTO_UPDATE=true
      - CONFIG_REPO_URL=https://github.com/robkaandorp/CopilotHive-Config.git
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
      replicas: 1
    networks:
      - hive

volumes:
  orchestrator-state:
  copilot-sessions:

networks:
  hive:
